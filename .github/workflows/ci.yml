name: CI (import + unit tests)

# 開発ブランチと PR で、Godot のインポートとヘッドレス単体テストを回す。
# deploy.yml（main の Pages 配信）とは別に、feature ブランチでも GDScript の
# パースエラーや sim/接客ロジックの退行をすぐ検出するための軽量 CI。
on:
  push:
    branches: ["claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import assets
        # 生成テクスチャ/音声などの .import を生成（初回は警告が出ても続行）
        run: godot --headless --import || true

      - name: Run unit tests
        # 失敗時は test_sim.gd が exit 1 で返すのでジョブも落ちる
        run: godot --headless -s tests/test_sim.gd
