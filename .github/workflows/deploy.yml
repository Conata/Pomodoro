name: Build & Deploy to GitHub Pages

on:
  # Godot開発開始に伴い push トリガー化（DESIGN.md / 引き継ぎブリーフの予定どおり）。
  # Pages の Source が「GitHub Actions」になっている必要がある
  # （configure-pages の enablement で自動有効化を試みる）。
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        # コンテナジョブでは HOME が /github/home に変わる。イメージ同梱の
        # テンプレート（/root 配下）を HOME 側へ「コピー」する。mv だと
        # godot が /root 側を参照する構成のとき消えてしまうので cp。
        run: |
          echo "HOME=$HOME"
          godot --version
          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -r /root/.local/share/godot/export_templates/4.6.stable "$HOME/.local/share/godot/export_templates/" || true
          ls -la "$HOME/.local/share/godot/export_templates/" || true
          ls -la /root/.local/share/godot/export_templates/ || true

      - name: Import assets
        run: godot --headless --import || true

      - name: Run unit tests
        run: godot --headless -s tests/test_sim.gd

      - name: Export Web (single-threaded — Pages対応)
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          ls -la build/web

      - name: Cache-bust (.pck)
        # Godot Web は .pck（ゲーム本体）を同名で出すため、ブラウザが強くキャッシュし
        # デプロイしても古い版が表示され続ける。GODOT_CONFIG に mainPack を注入し
        # index.pck?v=<sha> で取得させる（Pagesはクエリ無視で実体を返す＝URL別で更新）。
        # 失敗してもデプロイは壊さない（追記のみ・|| true）。
        run: |
          # シェルは sh(dash) のため bash 専用の ${VAR::N} は使わない（POSIX cut）
          SHA=$(printf '%s' "$GITHUB_SHA" | cut -c1-8)
          sed -i "s#const GODOT_CONFIG = {#const GODOT_CONFIG = {\"mainPack\":\"index.pck?v=${SHA}\",#" build/web/index.html || true
          echo "--- mainPack injection check ---"
          grep -o 'mainPack[^,]*' build/web/index.html || echo "（マーカー未検出：従来どおり配信＝壊れはしない）"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # 証拠束：全画面スクショ＋バランスレポートを push 毎に成果物として添付。
  # 「変更のたびに見て・遊んで判断する」ための材料。失敗してもデプロイは止めない。
  evidence:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xvfb + X11/GL runtime (ソフトウェアGLでHD-2Dを実レンダリング)
        # godot-ci コンテナはヘッドレス前提で X11 ランタイムを持たない。
        # Godot の DisplayServerX11 が動的ロードする libXcursor 等が無いと
        # Xvfb 下でも即死する（XCursor→wayland フォールバック→全滅）。
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            xvfb libxcursor1 libxinerama1 libxrandr2 libxrender1 libxext6 libxi6 libxkbcommon0 \
            libgl1 libegl1 libgl1-mesa-dri libglu1-mesa fontconfig

      - name: Import assets
        run: godot --headless --import || true

      - name: Balance report (15/25/50分＋7日耐久シミュ)
        run: godot --headless -s tools/balance_report.gd | tee balance_report.txt

      - name: Screenshots (実フロー駆動で全9画面)
        run: |
          xvfb-run -a -s "-screen 0 760x1320x24" \
            godot --rendering-method gl_compatibility --rendering-driver opengl3 \
            --audio-driver Dummy --path . -s tools/screens_shot.gd

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence
          path: |
            _out/screens/
            balance_report.txt
          if-no-files-found: warn

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable & configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
